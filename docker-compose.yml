name: osiris
services:
  osiris:
    image: ghcr.io/aiacos/osiris:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osiris
    ports:
      - "${OSIRIS_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
